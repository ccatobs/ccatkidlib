---
sess_id: null

##############################
# External System Parameters #
##############################

# Add external system parameters that change over the course of data acquisiton here
avail_space: null # Available space on board in GB
bath_temp: null

---
sess_id: null

###########################
# Drone/Board List Config #
###########################

drone_list: ['1'] # List of boards/drones to use

initialize: True
parallel: False # Whether to send commands to all drones in parallel (will stop all drones not in drone_list)
restart: True # Whether to restart already running drones

# Board configuration
udp_ip: "192.168.3.40"
udp_port: 4096
boards:
  b1: 
    board_ip: '192.168.2.100'
    sampling_freq: 488.28 # Timestream sampling frequency (in Hz)
    max_power: 32767
    drone_cfg: "/home/pcs/ccatkidlib/rfsoc/drones_config_1.yaml"
  b2:
    board_ip: '192.168.2.101'
    sampling_freq: 488.28 # Timestream sampling frequency
    max_power: 32767
    drone_cfg: "/home/pcs/ccatkidlib/rfsoc/drones_config_2.yaml"

##################
# File IO Config #
##################

# File paths
file_paths:
  analysis_dir: "/home/pcs/ccatkidlib/analysis/"                                           # Analysis code directory
  data_dir: "/mnt/md0/cooldown_dec/test"                                           # Directory to save data in
  tmp_data_dir: "/home/pcs/primecam_readout/src/tmp"                     # Temp data directory in which primecam_readout saves files
  primecam_readout: "/home/pcs/primecam_readout/src/"                    # Primecam_readout source code directory
  master_drone_list: "/home/pcs/primecam_readout/master_drone_list.yaml" # Master Drone List File
  pcs_dir: "/home/ocs/pcs-site-configs/"                                 # PCS directory
  ssh_key: "/home/pcs/.ssh/id_ecdsa"                                       # Path to RSA key (null if no key)
  drone_dir: "/home/xilinx/primecam_readout/drones"                        # Drone directory on the boards

# File names of saved data files
save_file_names:
  timestream: 'att_to_tone_tstream' # Timestream file name
  targ_sweep: 'att_to_tone_targ'      # Target sweep file name
  vna_sweep: 'att_to_tone_vna'        # VNA sweep file name

# File names of files on RFSoC boards
board_file_names:
  vna_s21: 's21_vna'
  targ_s21: 's21_targ'
  vna_res: 'f_res_vna'
  targ_res: 'f_res_targ'
  comb_freq: 'f_rf_tones_comb'
  comb_amp: 'a_tones_comb'
  comb_phi: 'p_tones_comb'

# PCS agent IDs
pcs_agents:
  rfsoc_agent: "det-queenagent" # RFSoC agent ID 

# Runtime IO config
io:
  logging_level: 'INFO'
  logging_fname: "rfsoc_daq_log.txt"
  terminal_output: True  # Whether to print logs to terminal
  save_data: True        # Whether to save data
  save_config_copy: True # Whether to sawe copy of config (Recommended to use True)
  max_file_size: 2000     # Max file size of timestreams in Megabytes
...
