# ##############################################################################################
# Parameters with * are measurment specific, ? are system specific, and - should not be edited #
# ##############################################################################################

---
sess_id: null

##############################
# External System Parameters #
##############################

# - Board properties
boards:
  b1:
    avail_space: null
    ps_temp: null
    pl_temp: null
  b2:
    avail_space: null
    ps_temp: null
    pl_temp: null

---

# Create Jinja variables for values used more than once
{% set measurement_name="primecam_readout_update" %}            # * Measurement Name
{% set root_dir="/mnt/md0/" %} # * Root data directory (the part of the path that would change when transferring data to different drive)

sess_id: null
name: {{measurement_name}} # * Measurement Name
desc: "Test newest version of primecam_readout." # Description of measurement

###########################
# Drone/Board List Config #
###########################

# Drone configuration
drone_list: ['1.1', '2.1'] # *List of boards/drones to use

init:
  initialize_boards: False  # * Whether to reintialize boards
  initialize_drones: True   # * Whether to run drone initialize commands (e.g. set_atten and setNCLO)
  restart: False            # * Whether to restart already running drones

runtime:
  parallel_boards: -1 # * Number of boards to run in parallel (-1 for all boards in parallel)
  parallel_drones: 4  # * Number of drones to run in in parallel  

# Board configuration
boards:
  b1: 
    name: rfsoc100 # ? Name of RFSoC (for readibility, not used for anything)
    board_ip: '192.168.2.100' # ? Board IP address
    sampling_freq: 488.28 # - Timestream sampling frequency (in Hz)
    max_power: 32767 # - Max power at the drone DACs
    drone_cfg: "/home/pcs/ccatkidlib/ccatkidlib/rfsoc/rfsoc100_config.yaml" # * Drone configuration file
  b2:
    name: rfsoc101 # ? Name of RFSoC (for readibility, not used for anything)
    board_ip: '192.168.2.101' # ? Board IP address
    sampling_freq: 488.28 # - Timestream sampling frequency
    max_power: 32767 # - Max power at the drone DACs
    drone_cfg: "/home/pcs/ccatkidlib/ccatkidlib/rfsoc/rfsoc101_config.yaml" # * Drone configuration file

# Timestream configuration
timestream:
  udp_ip: "192.168.3.40"  # ? Control computer UDP packet capture port IP address
  udp_port: 4096          # ? Control computer UDP packet capture port number
  g3: True               # * Whether to save timestreams as g3 files
  file_rotation_time: 600 # * Length of timestream files (in seconds)
  save_interval: 3

# PCS agent IDs
pcs_agents:
  rfsoc_agent: "det-queenagent" # ? RFSoC agent ID 

##################
# File IO Config #
##################

# File paths
file_paths:
  root_dir: "{{root_dir}}"
  data_dir: "{{root_dir}}/{{measurement_name}}"                          # * Directory to save data in
  g3_dir:   "{{root_dir}}/g3_temp/g3"                                    # ? Directory where g3 files are saved (as specified in rfsoc-streamer config)
  
  primecam_readout: "/home/pcs/primecam_readout/src/"                    # ? Primecam_readout source code directory
  master_drone_list: "/home/pcs/primecam_readout/master_drone_list.yaml" # ? Master Drone List File
  pcs_dir: "/home/ocs/pcs-deployment-configs/"                           # ? PCS directory
  ssh_key: "/home/pcs/.ssh/id_ecdsa"                                     # ? Path to private ssh key (null if no key)
  drone_dir: "/home/xilinx/primecam_readout/drones"                      # - Drone directory on the boards

# * File names of saved data files
save_file_names:
  timestream: '{{measurement_name}}_tstream' # * Timestream file name
  targ_sweep: '{{measurement_name}}_targ'    # * Target sweep file name
  vna_sweep:  '{{measurement_name}}_vna'     # * VNA sweep file name

# - Names of files on RFSoC boards
board_file_names:
  vna:
    s21: 's21_vna'
    res: 'f_res_vna'
    comb_freq: 'freqs_vna'
    comb_amp:  'amps_vna'
    comb_phi:  'phis_vna'
  targ:
    s21: 's21_targ'
    res: 'f_res_targ'
    comb_freq: 'f_rf_tones_comb'
    comb_amp:  'a_tones_comb'
    comb_phi:  'p_tones_comb'

clean:
  threshold: 10       # * Remaining disk space in GB after which boards should be automatically cleaned (negative number for no auto cleaning)
  olderThanDaysAgo: 1 # * (days) Clean files older than specified number of days
  ftype: '.npy'       # * File type to clean
  tmp: True           # * Whether to clean tmp primecam_readout and ccatkidlib directories on control computer

# Runtime IO config
io:
  logging_level: 'INFO'   # * Logging level
  logging_fname: "rfsoc_daq_log.txt" # * Log file name
  terminal_output: True   # * Whether to print logs to terminal
  influx_output: True     # * Whether to push measurement info to InfluxDB through the queen_agent
  save_data: True         # * Whether to save data
  save_config_copy: True  # * Whether to save copy of config (Recommended to use True)
...
