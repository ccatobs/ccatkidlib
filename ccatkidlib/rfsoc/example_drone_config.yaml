---
sess_id: None

# bid.drid (Board ID & Drone ID)
com_to: '1.1'
udp_source_ip: '192.168.3.50'
udp_source_port: 4096

# Tone configuration
tones:
  NCLO: 850                    # Numerically controlled oscillator frequency (in MHz)
  bandwidth: 2                 # Bandwidth of each target sweep tone
  N_step: 500                  # Number of points of each target sweep tone
  dB: True                     # True if tone powers are given in dB
  num_tones: None
  tone_freqs: []               # Tone frequencies used for target sweep
  tone_powers: 54              # Tone powers used for target sweep
  tone_phis: []                # Tone phases used for target sweep

# Attenuator configuration
atten:
  drive: 10 # Drive (DAC) attenuation in dB (float between 0 and 31.75)
  sense: 2  # Sense (ADC) attenuation in dB (float between 0 and 31.75)

# Detector configuration
det_config:
  detector_type: "TiN" # Material of detectors
  nominal_num_detectors: 500
  nominal_detector_freqs: [] # Units of Hz

  found_num_detectors: None # Number of detectors found using find_detectors method
  found_detector_freqs: None # Array of found detector frequencies

det_find:
  peak_prom_std: 5
  peak_prom_db: 0
  peak_dis: 100
  width_min: 5
  width_max: 100
  stitch: True
  stitch_sw: 100
  continuum_wn: 300
  remove_cont: True
  remove_noise: True
  noise_wn: 30000

